<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>UI/UX Prototype Reiseportal</title>
</head>
<body>

    <nav>
        <div>
            <a href="../../index.html">
                <img src="img/aviation_logo-22.jpg" alt="Aviation Portal Logo">
            </a>
        </div>

        <!-- Hamburger Button (Mobile) -->
        <button class="nav-toggle" aria-label="Menü öffnen" onclick="this.closest('nav').querySelector('div:last-child').classList.toggle('open')">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div>
            <ul>
                <li><a href="#">our destinations</a></li>
                <li><a href="#">our gallery</a></li>
                <li><a href="#">book your trip</a></li>
                <li><a href="#">contact us</a></li>
            </ul>
        </div>
    </nav>


    <header>
        <div class="karte">
            <img src="img/christine-roy-ir5MHI6rPg0-unsplash.jpg" alt="">
        </div>

        <div class="search-box">
            <div class="tab-bar">
                <div class="flight-tab">
                    <span class="plane-icon">✈</span> Flight
                </div>
            </div>
            
            <h1>Travel the world with us</h1>
            
            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label for="from">From</label>
                        <input type="text" id="from" placeholder="Departing from">
                    </div>
                    <div class="form-group">
                        <label for="to">To</label>
                        <input type="text" id="to" placeholder="Arriving at">
                    </div>
                </div>
                <button type="submit" class="search-btn">Search And Find Dates</button>
            </form>
        </div>
    </header>


    <main>
        
        <!-- Our Destinations Section -->
        <section class="gallery-head">
            <h2>Our Destinations</h2>
            <p>Up to 50% discount</p>
        </section>

        <section class="gallery">
            <figure class="gallery-big">
                <img src="img/luca-bravo-O453M2Liufs-unsplash.jpg" alt="Boot auf See">
            </figure>

            <div class="gallery-grid">
                <figure><img src="img/ian-dooley-hpTH5b6mo2s-unsplash.jpg" alt="Stadt bei Nacht"></figure>
                <figure><img src="img/jack-anstey-XVoyX7l9ocY-unsplash.jpg" alt="Person am See"></figure>
                <figure><img src="img/jairph-1XLyzi17Z2M-unsplash.jpg" alt="Küste und Häuser"></figure>
                <figure><img src="img/jake-blucker-tMzCrBkM99Y-unsplash.jpg" alt="Gasse mit Person"></figure>
            </div>
        </section>

        <!-- Our Gallery Section -->
        <section class="gallery-head">
            <h2>Our Gallery</h2>
            <p>Explore some of our past adventures</p>
        </section>

        <div class="gallery-2">
            <figure><img src="img/gaddafi-rusli-2ueUnL4CkV8-unsplash.jpg" alt="Stadtansicht"></figure>
            <figure><img src="img/philipp-kammerer-6Mxb_mZ_Q8E-unsplash.jpg" alt="Strand"></figure>
            <figure><img src="img/ryan-miglinczy-02n9_v-d1yY-unsplash.jpg" alt="Heißluftballons"></figure>
            <figure><img src="img/ryan-XGKaRnWjv1c-unsplash.jpg" alt="Viadukt"></figure>
            <figure><img src="img/timo-stern-iUBgeNeyVy8-unsplash.jpg" alt="Küstenstraße"></figure>
            <figure><img src="img/gaddafi-rusli-2ueUnL4CkV8-unsplash.jpg" alt="Landschaft"></figure>
        </div>

    </main>

    <footer>
        <ul>
            <li>Heading</li>
            <li><a href="#">Link 1</a></li>
            <li><a href="#">Link 2</a></li> 
            <li><a href="#">Link 3</a></li>
        </ul>
    </footer>

</body>
</html>
